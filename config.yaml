# ===================================================================
#                       MAIN CONFIGURATION
# ===================================================================

seed: 42
device: "cuda"  # Use "cpu" only if no GPU is available

# --- Data Paths ---
data:
  # Dataset root containing diagnosis subfolders (CTR, MCI, AD)
  dataset_root: "data/dataset"

  # Metadata file generated by prepare_dataset.py (contains audio paths for all tasks)
  metadata_file: "data/metadata/mmse_experiment_metadata.csv"
  mmse_scores_file: "data/metadata/adresso_FULL_mmse.csv"
  # Cross-Validation fold assignments
  folds_file: "data/metadata/dataset_folds.csv"

  # Transcript directory (or phonemes)
  # NOTE: If using XPhoneBERT, this must point to the _phonemes folder!
  transcripts_root: "data/transcripts/Parakeet_Unified"
  # For UmBERTo (plain text), use: "data/transcripts/WhisperX_large-v3"

  # Directory for saving/loading tabular features (CSV)
  features_root: "data/features"

  # Default pattern (overridden by run_all_tasks.py)
  audio_file_pattern: "Task_01"

# ===================================================================
#                    EXPERIMENT CONFIGURATION
# ===================================================================

# Experiment type:
# 1. "text" -> Text only (e.g., XPhoneBERT or UmBERTo)
# 2. "audio" -> Audio only (e.g., Wav2Vec2)
# 3. "multimodal" -> Simple fusion (Concatenation)
# 4. "multimodal_cross_attention" -> SOTA Fusion (Cross-Attention + GMU)
modality: "multimodal_cross_attention"

task: "regression"  # Options: "classification", "regression"

labels:
  scheme: "binary_strict"
  mapping:
    CTR: 0
    # MCI: 1      <-- Uncomment for Binary Inclusive
    MILD-AD: 1
    AD: 1

# ===================================================================
#                       MODEL PARAMETERS
# ===================================================================

model:
  text:
    # Option A: Phonemes (XPhoneBERT) - Best for disfluency detection
    name: "xlm-roberta-base"
    # Option B: Semantics (UmBERTo) - Best for content analysis
    # name: "Musixmatch/umberto-commoncrawl-cased-v1"

    max_length: 288 # Phonemes require more tokens than words
    dropout: 0.5

  audio:
    # SSL model for audio feature extraction
    pretrained: "facebook/wav2vec2-large-xlsr-53"
    sample_rate: 16000

    # false = Frozen encoder (fast, less memory). true = Fine-tuning (SOTA, slow).
    # For multimodal with small batch size, start with false.
    trainable_encoder: false
    dropout: 0.3

# ===================================================================
#                      TRAINING PARAMETERS
# ===================================================================

training:
  epochs: 20
  # Batch Size:
  # - 16 for Text only (XPhoneBERT)
  # - 4 for Multimodal Cross-Attention (to avoid OOM)
  batch_size: 16
  learning_rate:  2e-5  # 2e-5 standard for BERT, 1e-4 for Audio/Multimodal
  weight_decay: 0.01
  warmup_ratio: 0.1
  early_stopping_patience: 5
  gradient_checkpointing: false
  gradient_accumulation_steps: 1

  eval_metric: "f1"

# ===================================================================
#               FEATURE EXTRACTION CONFIGURATION (Tabular)
# ===================================================================
# Used by: scripts/extract_features.py and scripts/extract_embeddings.py

feature_extraction:
  # Options: "whisper_large_v3", "egemaps", "compare"
  feature_set: "whisper_large_v3"
  overwrite: true

# Whisper embedding extraction configuration
embedding_extraction:
  name: "whisper_large_v3"
  model_id: "openai/whisper-large-v3"
  pooling_strategy: "mean"
  batch_size: 16 # Batch size for extraction (inference only, can be high)

# Classical ML model training configuration (run_tabular_all_tasks.py)
tabular_model:
  name: "xgboost" # Options: "xgboost", "svm", "lr"

  grids:
    svm:
      C: [0.1, 1, 10, 100]
      gamma: ["scale", "auto", 0.01, 0.001]
      kernel: ["rbf", "linear"]
    xgboost:
      n_estimators: [50, 100, 200]
      max_depth: [3, 5, 7]
      learning_rate: [0.01, 0.1, 0.2]
      subsample: [0.8, 1.0]
    lr:
      C: [0.01, 0.1, 1, 10]
      penalty: ["l1", "l2"]
      solver: ["liblinear"]

# ===================================================================
#                   TRANSCRIPTION CONFIGURATION
# ===================================================================
# Used by: scripts/transcribe_all.py

transcription:
  engine: "whisperx"
  overwrite: false

  whisperx:
    model_name: "large-v3"
    batch_size: 16
    compute_type: "float16"
    language: "it"

  nemo:
    model_name: "nvidia/parakeet-tdt-0.6b-v3"
    batch_size: 2

  crisperwhisper:
    model_id: "nyrahealth/CrisperWhisper"
    batch_size: 16
    compute_type: "float16"

score_generation_models: []
